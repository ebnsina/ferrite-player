<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      @font-face { font-family: "Mona Sans"; src: url("./fonts/MonaSans.woff2") format("woff2"); font-weight: 200 900; }
      @font-face { font-family: "Fira Mono"; src: url("./fonts/FiraMono-500.woff2") format("woff2"); font-weight: 500; }
      * { margin: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; overflow: hidden; }
      body {
        font-family: "Mona Sans", sans-serif; color: #fff; position: relative;
        background: radial-gradient(120% 90% at 100% 100%, #12151a, #070809 60%);
        padding: 72px 80px; display: flex; flex-direction: column; justify-content: space-between;
      }
      body::before { content: ""; position: absolute; left: -120px; bottom: -220px; width: 620px; height: 620px;
        background: radial-gradient(circle, rgba(255,62,0,.35), transparent 62%); }
      .brand { display: flex; align-items: center; gap: 16px; position: relative; }
      .brand svg { width: 56px; height: 56px; filter: drop-shadow(0 6px 18px rgba(255,62,0,.4)); }
      .brand b { font-size: 30px; font-weight: 700; letter-spacing: -.01em; }
      .brand b span { color: #9098a3; font-weight: 500; }
      h1 { font-size: 92px; line-height: 1.0; font-weight: 800; letter-spacing: -.04em; position: relative; }
      .g { background: linear-gradient(110deg, #ff6a3d, #ff2d00); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
      .sub { font-family: "Fira Mono", monospace; font-size: 26px; color: rgba(255,255,255,.55); margin-top: 26px; letter-spacing: -.01em; }
      .foot { font-family: "Fira Mono", monospace; font-size: 22px; color: rgba(255,255,255,.4); position: relative; }
      .glyph { position: absolute; right: 96px; top: 50%; transform: translateY(-50%); width: 260px; height: 260px;
        border-radius: 50%; border: 2px solid rgba(255,255,255,.14); display: grid; place-items: center; }
      .glyph::before { content: ""; position: absolute; inset: -60px; border-radius: 50%; background: radial-gradient(circle, rgba(255,62,0,.22), transparent 62%); }
      .glyph i { width: 0; height: 0; border-left: 96px solid #fff; border-top: 58px solid transparent; border-bottom: 58px solid transparent; margin-left: 26px; }
    </style>
  </head>
  <body>
    <div class="brand">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="40" height="40" rx="11" fill="url(#g)"/><path d="M16.2 13.4c0-1.24 1.34-2.02 2.42-1.4l9.36 5.38c1.08.62 1.08 2.18 0 2.8l-9.36 5.38c-1.08.62-2.42-.16-2.42-1.4V13.4Z" fill="#fff"/><defs><linearGradient id="g" x1="4" y1="2" x2="36" y2="38" gradientUnits="userSpaceOnUse"><stop stop-color="#ff6a3d"/><stop offset="1" stop-color="#ff2d00"/></linearGradient></defs></svg>
      <b>Ferrite <span>Player</span></b>
    </div>
    <div>
      <h1>One tag for <span class="g">any</span><br />video.</h1>
      <div class="sub">HLS · DASH · MP4 · Live · DRM — Adaptive, only when needed</div>
    </div>
    <div class="foot">ebnsina.github.io/ferrite-player</div>
    <div class="glyph"><i></i></div>
  </body>
</html>
